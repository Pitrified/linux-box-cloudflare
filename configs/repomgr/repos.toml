# repos.toml - repomgr config for the linux-box workspace
#
# Usage:
#   repomgr --config ~/repos/linux-box-cloudflare/configs/repomgr/repos.toml status
#
# state_file is resolved relative to this file's parent directory.
# Clone URLs are derived from transport/host/owner + each repo's name.

[settings]
base_path        = "~/repos"
default_test_cmd = "uv run pytest"
state_file       = "./repos.state.json"
owner            = "Pitrified"
host             = "github.com"
transport        = "ssh"

# ---------------------------------------------------------------------------
# Sources - produce versioned tags consumed by other repos
# ---------------------------------------------------------------------------

[[repo]]
name       = "llm-core"
roles      = ["source"]
auto_merge = true

[[repo]]
name       = "fastapi-tools"
roles      = ["source"]
auto_merge = true

# Source + consumer: depends on llm-core + fastapi-tools; consumed by kit-hub
[[repo]]
name       = "media-downloader"
roles      = ["source", "consumer"]
auto_merge = true

# ---------------------------------------------------------------------------
# Consumers - depend on git-sourced packages from the sources above
# ---------------------------------------------------------------------------

[[repo]]
name   = "laife"
roles  = ["consumer"]

[[repo]]
name   = "kit-hub"
roles  = ["consumer"]

# ---------------------------------------------------------------------------
# Standalone - tracked for git status/fetch only, not in dep chain
# ---------------------------------------------------------------------------

[[repo]]
name   = "linux-box-cloudflare"
roles  = ["consumer"]

[[repo]]
name   = "repomgr"
roles  = ["consumer"]

[[repo]]
name   = "tg-central-hub-bot"
roles  = ["consumer"]

[[repo]]
name   = "python-project-template"
roles  = ["consumer"]

[[repo]]
name       = "recipamatic"
roles      = ["consumer"]
test_cmd   = "cd py && poetry run pytest"

[[repo]]
name   = "recipinator"
roles  = ["consumer"]

[[repo]]
name   = "cookbook"
roles  = ["consumer"]

# Local name uses an underscore; the GitHub repo uses a hyphen.
[[repo]]
name      = "convo_craft"
repo_name = "convo-craft"
roles     = ["consumer"]

[[repo]]
name   = "brazilian-bites"
roles  = ["consumer"]

[[repo]]
name   = "worldly-words"
roles  = ["consumer"]

[[repo]]
name   = "fala-comigo-ai-tutor"
roles  = ["consumer"]

[[repo]]
name   = "go-accenter"
roles  = ["consumer"]

[[repo]]
name   = "trip-me-up"
roles  = ["consumer"]

[[repo]]
name   = "climbing-wire"
roles  = ["consumer"]

[[repo]]
name   = "holo-table"
roles  = ["consumer"]

[[repo]]
name   = "abyss"
roles  = ["consumer"]

[[repo]]
name   = "pose-tools"
roles  = ["consumer"]

[[repo]]
name   = "places-tools"
roles  = ["consumer"]

[[repo]]
name   = "lang-tools"
roles  = ["consumer"]

[[repo]]
name   = "lang-tutor"
roles  = ["consumer"]

[[repo]]
name   = "python-tools"
roles  = ["consumer"]

[[repo]]
name   = "Pitrified"
roles  = ["consumer"]

[[repo]]
name   = "pitrified.github.io"
roles  = ["consumer"]

[[repo]]
name   = "flutter-setup-project"
roles  = ["consumer"]

[[repo]]
name   = "snap_fit"
roles  = ["consumer"]
