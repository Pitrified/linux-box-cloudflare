# repos.toml - repomgr config for the linux-box workspace
#
# Usage:
#   repomgr --config ~/repos/linux-box-cloudflare/configs/repomgr/repos.toml status
#
# state_file is resolved relative to this file's parent directory.
# Clone URLs are derived from transport/host/owner + each repo's name.
#
# Roles: "source" produces tags, "consumer" has git deps on a source.
# A repo with no roles is plain: cloned, fetched, and fast-forwarded only -
# never tested, tagged, or dep-updated. Omit `roles` for a plain repo.

[settings]
base_path        = "~/repos"
default_test_cmd = "uv run pytest"
state_file       = "./repos.state.json"
owner            = "Pitrified"
host             = "github.com"
transport        = "ssh"

# ---------------------------------------------------------------------------
# Sources - produce versioned tags consumed by other repos
# ---------------------------------------------------------------------------

[[repo]]
name       = "llm-core"
roles      = ["source"]
auto_merge = true

[[repo]]
name       = "fastapi-tools"
roles      = ["source"]
auto_merge = true

# Source + consumer: depends on llm-core + fastapi-tools; consumed by kit-hub
[[repo]]
name       = "media-downloader"
roles      = ["source", "consumer"]
auto_merge = true

# ---------------------------------------------------------------------------
# Consumers - depend on git-sourced packages from the sources above
# ---------------------------------------------------------------------------

[[repo]]
name   = "laife"
roles  = ["consumer"]

[[repo]]
name   = "kit-hub"
roles  = ["consumer"]

[[repo]]
name   = "lang-tools"
roles  = ["consumer"]

[[repo]]
name   = "lang-tutor"
roles  = ["consumer"]

[[repo]]
name   = "python-project-template"
roles  = ["consumer"]

# ---------------------------------------------------------------------------
# Plain repos - tracked for git status/fetch/fast-forward only, no dep chain
# ---------------------------------------------------------------------------

[[repo]]
name   = "linux-box-cloudflare"

[[repo]]
name   = "repomgr"

[[repo]]
name   = "tg-central-hub-bot"

[[repo]]
name   = "recipamatic"

[[repo]]
name   = "recipinator"

[[repo]]
name   = "cookbook"

# Local name uses an underscore; the GitHub repo uses a hyphen.
[[repo]]
name      = "convo_craft"
repo_name = "convo-craft"

[[repo]]
name   = "brazilian-bites"

[[repo]]
name   = "worldly-words"

[[repo]]
name   = "fala-comigo-ai-tutor"

[[repo]]
name   = "go-accenter"

[[repo]]
name   = "trip-me-up"

[[repo]]
name   = "climbing-wire"

[[repo]]
name   = "holo-table"

[[repo]]
name   = "abyss"

[[repo]]
name   = "pose-tools"

[[repo]]
name   = "places-tools"

[[repo]]
name   = "python-tools"

[[repo]]
name   = "Pitrified"

[[repo]]
name   = "pitrified.github.io"

[[repo]]
name   = "flutter-setup-project"

[[repo]]
name   = "snap_fit"

[[repo]]
name   = "plans"

# ---------------------------------------------------------------------------
# Home-folder repos - plain repos cloned into ~ instead of base_path
# ---------------------------------------------------------------------------

[[repo]]
name = "dotfiles"
path = "~/dotfiles"

[[repo]]
name = "bootstrap"
path = "~/bootstrap"

# ---------------------------------------------------------------------------
# Private - listed in status (with a lock marker), skipped by --skip-private
# ---------------------------------------------------------------------------

[[repo]]
name    = "controcanto"
private = true
